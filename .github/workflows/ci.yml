name: CI

on:
  workflow_dispatch: # Disabled automatic triggers to stop build failure emails

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install Dependencies
        run: npm ci

      - name: Build ReScript
        run: npm run res:build

      - name: Run Full Test Suite
        run: npm test

      - name: Build Frontend (Production)
        run: npm run build

      - name: Enforce Bundle Budgets
        run: npm run budget:bundle

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Runtime Budget Suite
        run: npm run test:e2e:budgets

      - name: Enforce Runtime Budgets
        run: npm run budget:runtime
