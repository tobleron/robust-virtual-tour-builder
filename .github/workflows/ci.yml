name: Remax VTB CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Verify Version Consistency
      run: |
        echo "Checking version consistency..."
        # Extract version from src/version.js (export const VERSION = "3.5.0";)
        JS_VERSION=$(grep 'export const VERSION =' src/version.js | cut -d'"' -f2)
        echo "JS Version: $JS_VERSION"
        
        if [ -z "$JS_VERSION" ]; then
            echo "ERROR: Could not find VERSION in src/version.js"
            exit 1
        fi
        
        # Check if index.html contains the version in query params (e.g., ?v=3.5.0)
        if grep -q "v=$JS_VERSION" index.html; then
            echo "✅ Found matching version $JS_VERSION in index.html"
        else
            echo "❌ ERROR: Version $JS_VERSION not found in index.html query parameters"
            exit 1
        fi

    - name: Install dependencies
      run: npm install

    - name: Build CSS
      run: npm run css:build

    - name: Build Frontend
      run: npm run build

  backend:
    name: Backend CI (Rust)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: backend -> target

    - name: Cargo Check
      run: cd backend && cargo check

    - name: Cargo Test
      run: cd backend && cargo test
