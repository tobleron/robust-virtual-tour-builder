name: CI

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main, development ]

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install Dependencies
        run: npm ci

      - name: Verify Version Consistency
        run: |
          echo "Checking version consistency..."
          # Extract version from src/version.js (export const VERSION = "3.5.0";)
          JS_VERSION=$(grep 'export const VERSION =' src/version.js | cut -d'"' -f2)
          echo "JS Version: $JS_VERSION"
          
          if [ -z "$JS_VERSION" ]; then
              echo "ERROR: Could not find VERSION in src/version.js"
              exit 1
          fi
          
          # Check if index.html contains the version in query params (e.g., ?v=3.5.0)
          if grep -q "v=$JS_VERSION" index.html; then
              echo "✅ Found matching version $JS_VERSION in index.html"
          else
              echo "❌ ERROR: Version $JS_VERSION not found in index.html query parameters"
              exit 1
          fi

      - name: Build ReScript
        run: npm run res:build

      - name: Run Full Test Suite
        run: npm test

      - name: Build Frontend (Production)
        run: npm run build