name: Deploy Fly (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-fly-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Fly (main only)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && secrets.FLY_API_TOKEN != ''
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Enforce Main Release Guard
        run: ./scripts/guard-main-release.sh main

      - name: Deploy
        run: flyctl deploy --remote-only --config fly.toml --app app-still-dust-2222
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
