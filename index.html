<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#003da5" />
  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="VTB" />
  <link rel="apple-touch-icon" href="/images/icon-192.png" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' blob: https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' blob: data: http://localhost:8080 http://127.0.0.1:8080 http://0.0.0.0:8080; connect-src 'self' blob: ws: http://localhost:8080 http://127.0.0.1:8080 http://0.0.0.0:8080 https://nominatim.openstreetmap.org https://esm.sh; worker-src 'self' blob:; media-src 'self' blob: http://localhost:8080 http://127.0.0.1:8080 http://0.0.0.0:8080; object-src 'none'; base-uri 'self'; form-action 'self';">
  <title>
    <%= title %>
  </title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="<%= description %>">
  <meta name="keywords" content="virtual tour, 360 panorama, real estate, immersive, VR, property tour">
  <meta name="author" content="<%= author %>">
  <!-- Open Graph -->
  <meta property="og:title" content="<%= title %>">
  <meta property="og:description" content="<%= description %>">
  <meta property="og:type" content="website">
  <meta property="og:url" content="<%= publicUrl %>/">
  <meta property="og:image" content="<%= publicUrl %>/images/og-preview.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="<%= siteName %>">
  <meta property="og:locale" content="en_US">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="<%= title %>">
  <meta name="twitter:description" content="<%= description %>">
  <meta name="twitter:image" content="<%= publicUrl %>/images/og-preview.png">
  <!-- Canonical -->
  <link rel="canonical" href="<%= publicUrl %>/">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23003da5'/><path d='M50 10 A40 40 0 0 1 50 90' fill='%23dc3545'/><path d='M40 10 L40 90 M60 10 L60 90' stroke='white' stroke-width='2'/></svg>">
  <script src="/early-boot.js"></script>
  <link rel="stylesheet" href="/libs/pannellum.css?v=4.30.9+3" />
  <script src="/libs/jszip.min.js?v=4.30.9+3"></script>
  <script src="/libs/pannellum.js?v=4.30.9+3"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- CSS is now injected by Rsbuild via PostCSS pipeline -->
  <script
    type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Virtual Tour Builder","applicationCategory":"DesignApplication","operatingSystem":"Any","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"}}</script>
</head>

<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="app"></div>
  <!-- LIBRARIES -->
</body>

</html>
