<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#003da5" />

  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="VTB" />
  <link rel="apple-touch-icon" href="/images/icon-192.png" />

  <!-- Content Security Policy: Prevents XSS and unauthorized resource loading -->
  <meta http-equiv=4.2.94"Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://esm.sh;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' blob: data: http://localhost:8080 http://127.0.0.1:8080 http://0.0.0.0:8080;
    connect-src 'self' blob: ws: http://localhost:8080 http://127.0.0.1:8080 http://0.0.0.0:8080 https://nominatim.openstreetmap.org https://esm.sh;
    worker-src 'self' blob:;
    media-src 'self' blob: http://localhost:8080 http://127.0.0.1:8080 http://0.0.0.0:8080;
    object-src 'none';
    base-uri 'self';
    form-action 'self';
  ">

  <title>Remax Virtual Tour Builder</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23003da5'/><path d='M50 10 A40 40 0 0 1 50 90' fill='%23dc3545'/><path d='M40 10 L40 90 M60 10 L60 90' stroke='white' stroke-width='2'/></svg>">

  <script>
    /**
     * EMERGENCY TELEMETRY
     * Catch errors that happen BEFORE main application modules load.
     */
    const logEmergency = (level, message, data) => {
      fetch('http://localhost:8080/log-telemetry', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          level: level,
          module: 'EarlyBoot',
          message: message,
          data: data,
          timestamp: new Date().toISOString()
        })
      }).catch(() => { }); // Silent fail
    };

    window.onerror = (message, source, lineno, colno, error) => {
      console.error("[EarlyBoot] Uncaught Error:", message);
      logEmergency('error', `Early Uncaught Error: ${message}`, {
        source, lineno, colno,
        stack: error?.stack,
        type: error?.name || 'Error'
      });
    };

    window.onunhandledrejection = (event) => {
      const reason = event.reason;
      console.error("[EarlyBoot] Unhandled Rejection:", reason);
      logEmergency('error', "Early Unhandled Promise Rejection", {
        reason: reason instanceof Error ? reason.message : reason,
        stack: reason instanceof Error ? reason.stack : null
      });
    };

    // Force WebGL to keep the image buffer available for recording
    const oldGetContext = HTMLCanvasElement.prototype.getContext;
    HTMLCanvasElement.prototype.getContext = function (type, attributes) {
      if (
        type === "webgl" ||
        type === "experimental-webgl" ||
        type === "webgl2"
      ) {
        attributes = attributes || {};
        attributes.preserveDrawingBuffer = true; // <--- The Magic Switch
        attributes.alpha = false; // Force opaque background
      }
      return oldGetContext.call(this, type, attributes);
    };
  </script>

  <link rel="stylesheet" href="src/libs/pannellum.css" />
  <link rel="preload" href="src/libs/pannellum.js" as="script" />
  <link rel="preload" href="src/libs/jszip.min.js" as="script" />


  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap"

<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="app">
    <div id="sidebar" role="complementary" aria-label="Editor Sidebar"></div>
    <main id="main-content" class="viewer-container">
      <div id="viewer-stage">
        <div id="panorama-a" class="panorama-layer active" role="img" aria-label="Primary Panorama Viewer"></div>
        <div id="panorama-b" class="panorama-layer" role="img" aria-label="Secondary Panorama Viewer"></div>
        <div id="viewer-snapshot-overlay" aria-hidden="true"></div>
        <div id="cursor-guide" aria-hidden="true"></div>
        <div id="viewer-ui-layer"></div>
      </div>
      <div id="visual-pipeline-container" role="region" aria-label="Visual Pipeline"></div>
      <div id="placeholder-text" class="viewer-placeholder" aria-live="polite">
        <h3>Ready to Build</h3>
        <p>Use the sidebar to upload your images.</p>
      </div>
    </main>
    <div id="modal-container"></div>
    <div id="notification-container"></div>
  </div>
