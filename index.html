  <link rel="icon"

  <script>
    // Force WebGL to keep the image buffer available for recording
    const oldGetContext = HTMLCanvasElement.prototype.getContext;
    HTMLCanvasElement.prototype.getContext = function (type, attributes) {
      if (
        type === "webgl" ||
        type === "experimental-webgl" ||
        type === "webgl2"
      ) {
        attributes = attributes || {};
        attributes.preserveDrawingBuffer = true; // <--- The Magic Switch
        attributes.alpha = false; // Force opaque background
      }
      return oldGetContext.call(this, type, attributes);
    };
  </script>

  <link rel="stylesheet" href="src/libs/pannellum.css" />
  <script src="src/libs/pannellum.js"></script>
  <script src="src/libs/jszip.min.js"></script>

  <style>
    /* Modern Toast Notifications */
    #notification-container {
      position: fixed;
      bottom: 25px;
      right: 25px;
      z-index: 20000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      background: rgba(30, 41, 59, 0.95);
      backdrop-filter: blur(8px);
      color: white;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      transform: translateX(30px);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: auto;
      border-left: 4px solid #3b82f6;
      min-width: 280px;
      max-width: 450px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(0);
    }

    .toast.error {
      border-left-color: #ef4444;
      background: rgba(69, 10, 10, 0.95);
    }

    .toast.success {
      border-left-color: #10b981;
      background: rgba(6, 78, 59, 0.95);
    }

    .toast.warning {
      border-left-color: #f59e0b;
      background: rgba(69, 26, 3, 0.95);
    }

    /* Progress Bar Animations */
    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: 200% center;
      }

      100% {
        background-position: -200% center;
      }
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.5;
        transform: scale(0.8);
      }
    }
  </style>
</head>

<body>
  <div id="notification-container"></div>
  <div id="top-bar"></div>
  <div id="app">
    <div id="sidebar"></div>
    <div id="viewer-container">
      <div id="viewer-stage">
        <div id="panorama"></div>
        <div id="cursor-guide"></div>
      </div>
      <div id="placeholder-text" class="viewer-placeholder">
        <h3>Ready to Build</h3>
        <p>Use the sidebar to upload your images.</p>
      </div>
    </div>
    <div id="modal-container"></div>
  </div>
