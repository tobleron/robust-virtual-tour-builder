openapi: 3.0.3
info:
  title: Remax VTB API
  version: 4.2.91
  description: Professional-grade Backend API for Virtual Tour Builder. Supports panoramic image processing, computer vision utilities, and project management.
  contact:
    name: Advanced Agentic Coding Team
    url: https://github.com/tobleron/robust-virtual-tour-builder

servers:
  - url: http://localhost:8080
    description: Development server

paths:
  /health:
    get:
      summary: Health check
      description: Returns the status of the backend server.
      responses:
        '200':
          description: Server is running
          content:
            text/plain:
              schema:
                type: string
                example: Remax VTB Backend is running!

  /api/admin/shutdown:
    post:
      summary: Trigger graceful shutdown
      description: Initiates a graceful shutdown of the backend server.
      tags:
        - Admin
      responses:
        '200':
          description: Shutdown initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  active_requests:
                    type: integer
                example:
                  message: "Shutdown initiated"
                  active_requests: 0

  /api/quota/stats:
    get:
      summary: Get upload quota statistics
      description: Returns statistics about current active uploads and disk usage limits.
      tags:
        - Utils
      responses:
        '200':
          description: Quota statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuotaStats'

  /api/telemetry/log:
    post:
      summary: Log telemetry event
      tags:
        - Telemetry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryEntry'
      responses:
        '200':
          description: Logged successfully
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/telemetry/error:
    post:
      summary: Log error event
      tags:
        - Telemetry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryEntry'
      responses:
        '200':
          description: Logged successfully
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/telemetry/cleanup:
    post:
      summary: Clean up old logs
      description: Deletes log files older than the configured retention period.
      tags:
        - Telemetry
      responses:
        '200':
          description: Cleanup completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                example:
                  deleted: 5

  /api/geocoding/reverse:
    post:
      summary: Reverse geocode coordinates
      description: Returns a human-readable address for the given latitude and longitude.
      tags:
        - Geocoding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeocodeRequest'
      responses:
        '200':
          description: Address found (or fallback message)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocodeResponse'

  /api/geocoding/stats:
    get:
      summary: Get geocoding cache stats
      tags:
        - Geocoding
      responses:
        '200':
          description: Cache statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocodeStats'

  /api/geocoding/cache:
    delete:
      summary: Clear geocoding cache
      tags:
        - Geocoding
      responses:
        '200':
          description: Cache cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                example:
                  success: true
                  message: "Cache cleared"

  /api/media/optimize:
    post:
      summary: Optimize a single image
      description: Decodes, resizes to 4K, and encodes as WebP for quick previews.
      tags:
        - Media
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Optimized image (WebP)
          content:
            image/webp:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'

  /api/media/process-full:
    post:
      summary: Full image processing pipeline
      description: Performs deep analysis (EXIF, quality) and generates multiple sizes (4K, thumbnail).
      tags:
        - Media
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: ZIP containing preview.webp, tiny.webp, and metadata.json
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/media/transcode-video:
    post:
      summary: Transcode video to MP4
      description: Converts uploaded video (WebM/other) to H.264 MP4 using FFmpeg.
      tags:
        - Media
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Transcoded video
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/media/extract-metadata:
    post:
      summary: Extract image metadata
      description: Returns EXIF and quality analysis without saving the image.
      tags:
        - Media
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Metadata results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetadataResponse'

  /api/media/similarity:
    post:
      summary: Batch calculate image similarity
      description: Compares histograms of multiple image pairs to detect near-duplicates.
      tags:
        - Media
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimilarityRequest'
      responses:
        '200':
          description: Similarity results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimilarityResponse'

  /api/media/resize-batch:
    post:
      summary: Batch resize images
      description: Generates 4K, 2K, and HD versions of an uploaded image.
      tags:
        - Media
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: ZIP containing 4k.webp, 2k.webp, and hd.webp
          content:
            application/zip:
              schema:
                type: string
                format: binary

  /api/media/generate-teaser:
    post:
      summary: Generate tour teaser video
      description: Orchestrates headless Chrome to record a cinematic tour navigation as MP4.
      tags:
        - Media
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                project_data:
                  type: string
                  description: JSON string of the project
                width:
                  type: integer
                  default: 1920
                height:
                  type: integer
                  default: 1080
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: Generated teaser MP4
          content:
            video/mp4:
              schema:
                type: string
                format: binary

  /api/project/save:
    post:
      summary: Save project to ZIP
      description: Validates and packages project JSON and images into a persistent ZIP archive.
      tags:
        - Project
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                project_data:
                  type: string
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: Project ZIP
          content:
            application/zip:
              schema:
                type: string
                format: binary

  /api/project/load:
    post:
      summary: Load project from ZIP
      description: Validates an uploaded project ZIP and returns a normalized version.
      tags:
        - Project
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Processed Project ZIP
          content:
            application/zip:
              schema:
                type: string
                format: binary

  /api/project/create-tour-package:
    post:
      summary: Export final tour package
      description: Creates a self-contained ZIP ready for hosting on any static server.
      tags:
        - Project
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                project_data:
                  type: string
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: Exportable package ZIP
          content:
            application/zip:
              schema:
                type: string
                format: binary

  /api/project/validate:
    post:
      summary: Validate project integrity
      description: Checks project ZIP for broken links, missing files, or orphaned scenes.
      tags:
        - Project
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Validation report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationReport'

  /api/project/import:
    post:
      summary: Import project into session
      description: Extracts ZIP contents into a server-side session for editing.
      tags:
        - Project
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Session established
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResponse'

  /api/project/calculate-path:
    post:
      summary: Calculate optimal tour path
      description: Determines navigation steps between scenes (Walk or Timeline modes).
      tags:
        - Project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PathRequest'
      responses:
        '200':
          description: Sequence of path steps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Step'

  /api/session/{session_id}/{filename}:
    get:
      summary: Serve session file
      description: Accesses raw assets currently stored in an active session directory.
      tags:
        - Utils
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File content
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Session or file not found

components:
  responses:
    BadRequest:
      description: Invalid request payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    PayloadTooLarge:
      description: Upload exceeds configured size limit
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      example:
        error: "Invalid file format"

    TelemetryEntry:
      type: object
      required: [level, module, message, timestamp]
      properties:
        level:
          type: string
          enum: [INFO, WARN, ERROR, DEBUG]
        module:
          type: string
        message:
          type: string
        data:
          type: object
          nullable: true
        timestamp:
          type: string
          format: date-time

    GeocodeRequest:
      type: object
      required: [lat, lon]
      properties:
        lat:
          type: number
          format: double
        lon:
          type: number
          format: double

    GeocodeResponse:
      type: object
      properties:
        address:
          type: string

    GeocodeStats:
      type: object
      properties:
        cacheSize:
          type: integer
        maxCacheSize:
          type: integer
        hitRate:
          type: number
        totalRequests:
          type: integer
        hits:
          type: integer
        misses:
          type: integer
        evictions:
          type: integer
        lastSave:
          type: string
          format: date-time
          nullable: true

    QuotaStats:
      type: object
      properties:
        activeUploads:
          type: integer
        totalActiveSize:
          type: integer
        maxTotalSize:
          type: integer
        utilizationPercent:
          type: integer

    MetadataResponse:
      type: object
      properties:
        exif:
          $ref: '#/components/schemas/ExifMetadata'
        quality:
          $ref: '#/components/schemas/QualityAnalysis'
        isOptimized:
          type: boolean
        checksum:
          type: string
        suggestedName:
          type: string
          nullable: true

    ExifMetadata:
      type: object
      properties:
        make:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        dateTime:
          type: string
          nullable: true
        gps:
          type: object
          nullable: true
          properties:
            lat: { type: number }
            lon: { type: number }
        width: { type: integer }
        height: { type: integer }
        focalLength: { type: number, nullable: true }
        aperture: { type: number, nullable: true }
        iso: { type: integer, nullable: true }

    QualityAnalysis:
      type: object
      properties:
        score: { type: number }
        isBlurry: { type: boolean }
        isSoft: { type: boolean }
        isSeverelyDark: { type: boolean }
        isSeverelyBright: { type: boolean }
        issues: { type: integer }
        warnings: { type: integer }
        analysis: { type: string, nullable: true }

    SimilarityRequest:
      type: object
      required: [pairs]
      properties:
        pairs:
          type: array
          items:
            $ref: '#/components/schemas/SimilarityPair'

    SimilarityPair:
      type: object
      required: [idA, idB, histogramA, histogramB]
      properties:
        idA: { type: string }
        idB: { type: string }
        histogramA: { $ref: '#/components/schemas/HistogramData' }
        histogramB: { $ref: '#/components/schemas/HistogramData' }

    HistogramData:
      type: object
      properties:
        histogram:
          type: array
          items: { type: number }
          nullable: true
        colorHist:
          type: object
          nullable: true
          properties:
            r: { type: array, items: { type: number } }
            g: { type: array, items: { type: number } }
            b: { type: array, items: { type: number } }

    SimilarityResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/SimilarityResult'
        durationMs:
          type: integer

    SimilarityResult:
      type: object
      properties:
        idA: { type: string }
        idB: { type: string }
        similarity: { type: number }

    ValidationReport:
      type: object
      properties:
        brokenLinksRemoved: { type: integer }
        orphanedScenes: { type: array, items: { type: string } }
        unusedFiles: { type: array, items: { type: string } }
        warnings: { type: array, items: { type: string } }
        errors: { type: array, items: { type: string } }

    ImportResponse:
      type: object
      properties:
        sessionId: { type: string }
        projectData: { type: object }

    PathRequest:
      type: object
      required: [type, scenes, skipAutoForward]
      properties:
        type:
          type: string
          enum: [walk, timeline]
        scenes:
          type: array
          items: { $ref: '#/components/schemas/Scene' }
        timeline:
          type: array
          items: { $ref: '#/components/schemas/TimelineItem' }
        skipAutoForward: { type: boolean }
      example:
        type: walk
        skipAutoForward: true
        scenes:
          - id: "scene_1"
            name: "Living Room"
            isAutoForward: false
            hotspots:
              - target: "Kitchen"
                yaw: 45
                pitch: 0

    Scene:
      type: object
      required: [id, name, hotspots, isAutoForward]
      properties:
        id: { type: string }
        name: { type: string }
        isAutoForward: { type: boolean }
        hotspots:
          type: array
          items: { $ref: '#/components/schemas/Hotspot' }

    Hotspot:
      type: object
      required: [yaw, pitch, target]
      properties:
        linkId: { type: string, nullable: true }
        yaw: { type: number }
        pitch: { type: number }
        target: { type: string }
        targetYaw: { type: number, nullable: true }
        targetPitch: { type: number, nullable: true }
        isReturnLink: { type: boolean, nullable: true }

    TimelineItem:
      type: object
      required: [id, linkId, sceneId, targetScene]
      properties:
        id: { type: string }
        linkId: { type: string }
        sceneId: { type: string }
        targetScene: { type: string }

    Step:
      type: object
      properties:
        idx: { type: integer }
        transitionTarget:
          type: object
          nullable: true
          properties:
            yaw: { type: number }
            pitch: { type: number }
            targetName: { type: string }
            timelineItemId: { type: string, nullable: true }
        arrivalView:
          type: object
          properties:
            yaw: { type: number }
            pitch: { type: number }
      example:
        idx: 1
        transitionTarget:
          yaw: 90
          pitch: -10
          targetName: "Kitchen"
        arrivalView:
          yaw: 0
          pitch: 0
