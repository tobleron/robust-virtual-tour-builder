  color: var(--primary);
}

.label-pill.state-active {
  background: var(--slate-100);
  color: var(--primary-light);
}

.label-custom-section {
  border-top: 1px solid var(--slate-100);
  margin-top: 4px;
  padding: 12px 12px 6px;
}

.label-custom-title {
  color: var(--slate-400);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-bottom: 10px;
  font-size: 10px;
  font-weight: 600;
}

.label-custom-input-wrapper {
  align-items: center;
  gap: 8px;
  display: flex;
}

.label-custom-input {
  background: var(--slate-50);
  border: 1px solid var(--slate-200);
  color: var(--slate-800);
  border-radius: 8px;
  outline: none;
  flex: 1;
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 600;
  transition: all .2s;
}

.label-custom-input:focus {
  border-color: var(--primary-light);
  background: #fff;
  box-shadow: 0 0 0 3px #2563eb1a;
}

.label-custom-input::placeholder {
  color: var(--slate-300);
}

.label-btn-set {
  background: var(--primary-light);
  color: #fff;
  border-radius: 8px;
  padding: 9px 12px;
  font-size: 10px;
  font-weight: 600;
  transition: all .2s;
}

.label-btn-set:hover {
  background: var(--primary);
}

.label-btn-clear {
  background: var(--slate-100);
  color: var(--slate-600);
  border-radius: 8px;
  padding: 9px 12px;
  font-size: 10px;
  font-weight: 600;
  transition: all .2s;
}

.label-btn-clear:hover {
  background: var(--slate-200);
}

.scroll-indicator-bottom {
  background: linear-gradient(to top, #fff, #0000);
}

#label-presets-scroll::-webkit-scrollbar {
  width: 4px;
}

#label-presets-scroll::-webkit-scrollbar-thumb {
  background: var(--slate-200);
  border-radius: 10px;
}

.popover-root {
  z-index: 100000;
  pointer-events: auto;
  opacity: 0;
  transition: opacity .2s ease-out, transform .2s ease-out;
  position: fixed;
  transform: scale(.95)translateY(4px);
}

.popover-root.state-visible {
  opacity: 1;
  transform: scale(1)translateY(0);
}

.popover-content {
  border: 1px solid var(--slate-200);
  background: #fff;
  border-radius: 16px;
  max-height: calc(100vh - 40px);
  overflow: hidden;
  box-shadow: 0 20px 25px -5px #0000001a, 0 8px 10px -6px #0000001a;
}

.popover-tooltip {
  z-index: 110000;
  pointer-events: none;
}

.popover-tooltip .popover-content {
  box-shadow: var(--shadow-lg);
  pointer-events: none;
  border: none;
  border-radius: 8px;
}

.glass-panel {
  -webkit-backdrop-filter: blur(16px);
  background: #0f172ad9;
  border: 1px solid #ffffff1a;
  box-shadow: 0 10px 40px -10px #00000080;
}

.premium-glass {
  background: var(--glass-bg);
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  box-shadow: var(--shadow-premium);
}

.text-gradient {
  background: linear-gradient(135deg, #fff 0%, #ffffffb3 100%);
  -webkit-text-fill-color: transparent;
  -webkit-background-clip: text;
}

.hover-lift {
  transition: transform .2s cubic-bezier(.34, 1.56, .64, 1), box-shadow .2s;
}

.hover-lift:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
}

.active-push {
  transition: transform .1s;
}

.active-push:active {
  transform: scale(.97);
}

.bg-brand-gold {
  background-color: #fc0;
}

.text-brand-gold {
  color: #fc0;
}

.border-brand-gold\/20 {
  border-color: #ffcc004d;
}

#btn-delete-scene:hover {
  background-color: #f8d7da;
  border-radius: 4px;
}
